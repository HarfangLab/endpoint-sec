name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: "always"

on:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
  pull_request:

jobs:
  clippy-version-features:
    name: Clippy - feature ${{ matrix.feature }} (${{ matrix.version.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
        - { name: Stable, value: stable }
        feature:
          - macos_14_0_0
          - macos_13_3_0
          - macos_13_0_0
          - macos_12_0_0
          - macos_11_3_0
          - macos_11_0_0
          - macos_10_15_4
          - macos_10_15_1
          - default
          - objc2

    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version.value }}
          targets: x86_64-apple-darwin, aarch64-apple-darwin
          components: clippy

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.version.value }}-${{ matrix.feature }}

      - name: Fetch dependencies
        run: cargo +${{ matrix.version.value }} fetch --locked

      - name: Clippy
        run: |
          cargo +${{ matrix.version.value }} \
            clippy \
            --verbose \
            --locked \
            --offline \
            --all-targets \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --features ${{ matrix.feature }} \
            -- \
            -D warnings

  clippy-all-features:
    name: Clippy - all features (${{ matrix.version.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
        - { name: Stable, value: stable }

    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version.value }}
          targets: x86_64-apple-darwin, aarch64-apple-darwin
          components: clippy

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.version.value }}-all_features

      - name: Fetch dependencies
        run: cargo +${{ matrix.version.value }} fetch --locked

      - name: clippy
        run: |
          cargo +${{ matrix.version.value }} \
            clippy \
            --verbose \
            --locked \
            --offline \
            --all-targets \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --all-features \
            -- \
            -D warnings

  build-all-features:
    name: Build - all features (${{ matrix.version.name }})
    runs-on: macos-latest
    strategy:
      matrix:
        version:
        - { name: MSRV, value: "1.76.0" }
        - { name: Stable, value: stable }

    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version.value }}
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.version.value }}-all_features

      - name: Fetch dependencies
        run: cargo +${{ matrix.version.value }} fetch --locked

      - name: Build
        run: |
          cargo +${{ matrix.version.value }} \
            build \
            --verbose \
            --locked \
            --offline \
            --all-targets \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --all-features

  build-older-macos:
    name: Build ${{ matrix.os.feature }} on macOS ${{ matrix.os.version }} (${{ matrix.version.name }})
    runs-on: macos-${{ matrix.os.version }}
    strategy:
      matrix:
        version:
        # Only build older macOS on the MSRV, since that's the likely use case
        - { name: MSRV, value: "1.76.0" }
        os:
        # There are no 10.15, 11.3, 12, nor 13 runners anymore.
        # To avoid reaching the Github Actions limits, we only test for the
        # latest version of Endpoint Security on the OS version, e.g. 13.3 for
        # macOS 13.
        - { version: "14", feature: macos_10_15_4 }
        - { version: "14", feature: macos_11_3_0 }
        - { version: "14", feature: macos_12_0_0 }
        - { version: "14", feature: macos_13_3_0 }
        - { version: "14", feature: macos_14_0_0 }

    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version.value }}
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.version.value }}-${{ matrix.os.feature }}

      - name: Fetch dependencies
        run: cargo +${{ matrix.version.value }} fetch --locked

      - name: Build
        run: |
          cargo +${{ matrix.version.value }} \
            build \
            --verbose \
            --locked \
            --offline \
            --all-targets \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --features ${{ matrix.os.feature }}

  partial-tests:
    name: Run some of the tests on macOS-latest
    runs-on: macos-latest

    steps:
      - name: checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: stable-all_features

      - name: Fetch dependencies
        run: cargo +stable fetch --locked

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/mac | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Update PATH
        run: export PATH=$HOME/.cargo/bin:$PATH

      - name: Build all the tests
        run: cargo nextest run --no-run --verbose --locked --offline --all-features

      - name: Add entitlements to all test binaries
        run: find target/debug/deps -perm +111 -type f | grep -v '\.dylib$' | xargs -I '{}' codesign -s - --entitlements endpoint-sec/Entitlement.plist --force {}

      - name: Run the desired tests
        run: sudo cargo nextest run --verbose --locked --offline --all-features audit_token_from_pid

  fmt:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  documentation:
    name: Document - all features (${{ matrix.version.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
        - { name: Stable, value: stable }

    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache cargo output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.version.value }}-all_features

      - name: Fetch dependencies
        run: cargo +${{ matrix.version.value }} fetch --locked

      - name: Document
        run: |
          cargo +${{ matrix.version.value }} \
            doc \
            --verbose \
            --locked \
            --offline \
            --target x86_64-apple-darwin \
            --target aarch64-apple-darwin \
            --all-features
